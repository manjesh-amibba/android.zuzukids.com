<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>No Internet</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 1.5em;
    }

    .container {
      max-width: 400px;
    }

    img {
      width: 150px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 10px;
      color: #1f2937;
    }

    p {
      font-size: 1em;
      color: #6b7280;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 35px;
      font-size: 1em;
      color: white;
      background-color: #747ed1;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="no-internet.png" alt="No Internet">
    <h1>No Internet Connection</h1>
    <p>Please check your network settings and try again.</p>
    <button onclick="window.location.reload();">Retry</button>
  </div>
</body>
</html>
